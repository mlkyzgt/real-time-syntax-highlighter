<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Real-Time Syntax Highlighter + Parser</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #e6f0ff;
            color: #222;
        }

        h1 {
            font-family: 'Futura';
            text-align: center;
        }

        #editor {
            width: 90%;
            height: 300px;
            margin: 20px auto;
            border: 1.5px solid #99bbff;
            font-size: 16px;
            padding: 12px 15px;
            outline: none;
            overflow-y: auto;
            background-color: #f0f7ff;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0, 0, 50, 0.1);
            transition: border-color 0.3s ease;
        }

        #editor:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 8px #4a90e2aa;
        }

        .keyword-general {
            color: #2a52be;
            /* dark blue */
            font-weight: 700;
        }

        .keyword-case {
            color: #d2691e;
            /* dark orange */
            font-weight: 700;
        }

        .keyword-var {
            color: #6b18a6;
            /* purple */
            font-weight: 700;
        }

        .identifier {
            color: #161616;
        }

        .number {
            color: #c15f19;
        }

        .operator {
            color: #e33b3b;
            font-weight: 700;
        }

        .whitespace {
            color: #a6a5a5;
        }

        .string {
            color: #34a766;
        }

        .comment {
            color: #7d7b7b;
            font-style: italic;
        }

        .unknown {
            background-color: rgb(227, 194, 194);
            border-bottom: 2px solid #c63333;
        }

        #status {
            margin-top: 10px;
            font-weight: 700;
            color: #2a7d4e;
        }

        #status.error {
            color: #d43939;
        }

        #editor.syntax-error {
            border-color: #d43939;
            box-shadow: 0 0 6px #d53838aa;
        }
    </style>
</head>

<body>

    <h1>Real-Time Syntax Highlighter and Parser</h1>
    <div id="editor" contenteditable="true" spellcheck="false"></div>
    <div id="status"></div>

    <script>
        // Select the editor area
        const editor = document.getElementById("editor");

        // This will run when a key is pressed
        editor.addEventListener("keydown", function (e) {
            // If the pressed key is Enter
            if (e.key === "Enter") {
                // Prevent the browser's default action for Enter
                e.preventDefault();

                // Get the currently selected text
                const selection = window.getSelection();
                if (!selection.rangeCount) return; // Exit if there is no selection

                // Get the location of the selection
                const range = selection.getRangeAt(0);
                // Clear the selected content (e.g., delete selected text)
                range.deleteContents();

                // Add <br> to create a new line
                const br = document.createElement("br");
                range.insertNode(br);

                // Add another <br> so the cursor moves correctly to the new line
                const nextBr = document.createElement("br");
                range.insertNode(nextBr);

                // Move the cursor after the second <br> so it stays there
                range.setStartAfter(nextBr);
                range.collapse(true);

                // Update the selection
                selection.removeAllRanges();
                selection.addRange(range);
            }
        });

        // Define token types here
        const TokenType = {
            KeywordGeneral: 'keyword-general',  // General keywords (if, for, while, etc.)
            KeywordCase: 'keyword-case',      // Case keywords like 'case'
            KeywordVar: 'keyword-var',   // Variable declaration keywords (var, let, const)
            Identifier: 'identifier',        // Identifiers like variable names, function names
            Number: 'number',             // Numbers (123, 3.14, 0xFF, etc.)
            Operator: 'operator',           // Operation symbols (+, -, ==, &&, etc.)
            Whitespace: 'whitespace',         // Characters like space, tab, newline
            String: 'string',             // Text strings ("hello", 'hi', etc.)
            Comment: 'comment',            // In-code comments
            EndOfFile: 'eof',              // End of file (available but not currently used)
            UNKNOWN: 'unknown',            // Unknown types, things not yet defined
        };

        // General keywords used in the language
        const generalKeywords = [
            "break", "catch", "class", "continue", "debugger", "default", "delete",
            "do", "else", "export", "extends", "finally", "for", "function", "if",
            "import", "in", "instanceof", "new", "return", "super", "switch", "this",
            "throw", "try", "typeof", "void", "while", "with", "yield", "await",
            "static", "enum", "implements", "interface", "package", "private",
            "protected", "public", "true", "false", "null", "undefined"
        ];

        // Only the 'case' keyword (for switch-case)
        const caseKeywords = ["case"];

        // Keywords used to declare variables
        const variableKeywords = ["var", "let", "const"];

        // Regex patterns to distinguish different token types
        const tokenDefinitions = [
            [/^\s+/, TokenType.Whitespace],                           // Spaces, tabs, newlines
            [/^\/\/.*/, TokenType.Comment],                           // Single-line comment (starts with //)
            [/^\/\*[\s\S]*?\*\//, TokenType.Comment],                 // Multi-line comment (/* ... */)
            [/^"(?:[^"\\]|\\.)*"/, TokenType.String],                 // Text in double quotes
            [/^'(?:[^'\\]|\\.)*'/, TokenType.String],                 // Text in single quotes
            [/^`(?:[^`\\]|\\.)*`/, TokenType.String],                 // Template string written with backticks (`)
            [/^\b(?:0[xX][0-9a-fA-F]+|0[oO][0-7]+|0[bB][01]+|\d+(\.\d+)?([eE][+-]?\d+)?)\b/, TokenType.Number], // Numbers (hex, octal, binary, and decimal)
            [/^(===|!==|==|!=|<=|>=|=>|&&|\|\||\+\+|--)/, TokenType.Operator], // Multi-character operators
            [/^([-+*/%<>=!&|^~?:;,])/, TokenType.Operator],           // Single-character operators
            [/^[\(\)\{\}\[\]\.]/, TokenType.Operator],                // Parentheses, curly braces, square brackets, and dot
            [/^[a-zA-Z_$][a-zA-Z0-9_$]*/, 'identifier'],             // Identifiers (variable names, etc.)
        ];

        // --- LEXER (Lexical Analyzer) ---
        // This function takes the given code text and splits it into individual tokens.
        // It breaks the code down into meaningful small pieces: keywords, numbers, operators, etc.
        function lexicalAnalyzer(input) {
            const tokens = [];  // We will place the found tokens here
            let position = 0;   // The current character position in the text

            // Continue until the end of the text
            while (position < input.length) {
                let matched = false; // Did we find a match at the current position?

                // Try all regexes of token definitions in order
                for (const [regex, type] of tokenDefinitions) {
                    const substring = input.slice(position);  // The remaining text from the current position
                    const match = regex.exec(substring);      // Apply regex and see if there is a match

                    if (match) { // If there is a match
                        let value = match[0];  // The matched text segment
                        let tokenType = type;  // The type for now

                        // If the type is 'identifier', check what kind of keyword it actually is
                        if (type === 'identifier') {
                            if (generalKeywords.includes(value))
                                tokenType = TokenType.KeywordGeneral;
                            else if (caseKeywords.includes(value))
                                tokenType = TokenType.KeywordCase;
                            else if (variableKeywords.includes(value))
                                tokenType = TokenType.KeywordVar;
                            else
                                tokenType = TokenType.Identifier; // If none, it's a normal identifier
                        }

                        // Add the found token to the list
                        tokens.push({
                            type: tokenType,
                            value: value,
                            start: position,
                            end: position + value.length
                        });

                        // Advance the position (by the matched length)
                        position += value.length;
                        matched = true; // Mark that a match was found
                        break;          // No need to check other regexes, exit the loop
                    }
                }

                // If there is no match, we enter here
                if (!matched) {
                    // Mark as unknown character and move forward
                    tokens.push({
                        type: TokenType.UNKNOWN,
                        value: input[position],
                        start: position,
                        end: position + 1
                    });
                    position++;
                }
            }

            // Add end-of-file token at the end of the text
            tokens.push({ type: TokenType.EndOfFile, value: '', start: position, end: position });

            // Return all found tokens
            return tokens;
        }

        // --- HIGHLIGHTER ---
        // This function takes the tokens from the lexer and colors them as HTML.
        // We use it to make the code colorful and readable.
        function highlightTokens(tokens) {
            let html = '';  // The resulting HTML code

            // Process each token one by one
            tokens.forEach(token => {
                if (token.type === TokenType.Whitespace) {
                    // Replace spaces, tabs, and newlines with their HTML equivalents
                    html += token.value
                        .replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;') // Turn tab into 4 spaces
                        .replace(/ /g, '&nbsp;')                    // Convert normal spaces to HTML space
                        .replace(/\n/g, '<br>');                     // Add newline as <br>
                } else if (token.type === TokenType.EndOfFile) {
                    // Skip the end-of-file token as it is not visible
                } else {
                    // Wrap all other tokens in a <span> with the CSS class according to their type
                    // So different types can be shown in different colors
                    html += `<span class="${token.type}">${escapeHtmlCharacters(token.value)}</span>`;
                }
            });

            // Return the prepared HTML code
            return html;
        }

        // Safely escapes special HTML characters in the entered text
        // This prevents characters like <, >, &, " from causing issues in HTML
        function escapeHtmlCharacters(text) {
            const div = document.createElement('div');              // Create a temporary div
            div.appendChild(document.createTextNode(text));         // Add text inside this div as plain text
            return div.innerHTML;                                    // Get the HTML content of the div to escape special characters
        }

        // --- PARSER (Syntax Analyzer) ---
        // Class that checks and interprets the syntax of the code
        class Parser {
            constructor(tokens) {
                // Filter out whitespace and comments, work only with meaningful tokens
                this.tokens = tokens.filter(t => t.type !== TokenType.Whitespace && t.type !== TokenType.Comment);
                this.position = 0;      // Current token index
                this.errors = [];       // Store found syntax errors here
            }

            // Helper function to look at the current token
            peek() {
                return this.tokens[this.position];
            }

            // Consume (advance) the token if it matches the expected type and value, otherwise throw an error
            consume(expectedType, expectedValue = null) {
                const token = this.peek();  // Look at the current token

                // If type and (if present) value match, advance and return that token
                if (token.type === expectedType && (expectedValue === null || token.value === expectedValue)) {
                    this.position++;
                    return token;

                } else {
                    // If it doesn't match the expected, prepare a meaningful error message
                    let errorMessage = `Expected: '${expectedType}'`;
                    if (expectedValue !== null) {
                        errorMessage += ` (Value: '${expectedValue}')`;
                    }
                    errorMessage += `, Found: '${token.type}' ('${token.value}')`;

                    // Record error
                    this.recordError(errorMessage, token);

                    // Throw a syntax error so parsing stops
                    throw new SyntaxError(errorMessage + ` at position ${token.start}`);
                }
            }

            // Small function to record error information
            recordError(message, token) {
                this.errors.push({
                    message: message,       // Error message
                    token: token,           // On which token the error occurred
                    at: token.start         // Position of the error in the code
                });
            }

            // --- Grammar Rules ---
            // In this section, we analyze the code according to language rules

            // The program itself contains multiple statements, ending with end-of-file
            parseProgram() {
                this.errors = [];       // Reset errors
                const statements = [];  // Collect statements in the program here
                try {
                    // Parse statements one by one until end-of-file
                    while (this.peek().type !== TokenType.EndOfFile) {
                        statements.push(this.parseStatement());
                    }
                    this.consume(TokenType.EndOfFile);  // Consume end-of-file
                } catch (e) {
                    // Error is already added to the list, we just stop parsing here
                }
                // Return program structure and errors if any
                return {
                    type: 'Program',
                    statements,
                    errors: this.errors.length > 0 ? this.errors : null
                };
            }

            // A statement can be many different things, this decides which one it is
            parseStatement() {
                const token = this.peek();

                // First, check if it's a keyword and call the related parse function
                if (token.type === TokenType.KeywordGeneral) {
                    const value = token.value;
                    if (value === 'function') {
                        return this.parseFunctionDeclaration();
                    } else if (value === 'if') {
                        return this.parseIfStatement();
                    } else if (value === 'return') {
                        return this.parseReturnStatement();
                    } else if (value === 'for') {
                        return this.parseForStatement();
                    } else if (value === 'switch') {
                        return this.parseSwitchStatement();
                    } else if (value === 'break') {
                        return this.parseBreakStatement();
                    } else if (value === 'continue') {
                        return this.parseContinueStatement();
                    }
                }

                // If it's a variable declaration (var, let, const), call its parser
                if (token.type === TokenType.KeywordVar) {
                    return this.parseVariableDeclaration();
                }

                // If there is an identifier followed immediately by an '=' sign, it's an assignment
                if (token.type === TokenType.Identifier && this.tokens[this.position + 1] && this.tokens[this.position + 1].value === '=') {
                    return this.parseAssignment();
                }

                // If it's just a semicolon, parse as an empty statement
                if (token.value === ';') {
                    return this.parseEmptyStatement();
                }

                // If none of the above, go to general expression parser
                return this.parseExpressionStatement();
            }

            // Function parsing a function declaration
            parseFunctionDeclaration() {
                // Wait for and consume the 'function' keyword
                this.consume(TokenType.KeywordGeneral, 'function');

                // Get the function name
                const idToken = this.consume(TokenType.Identifier);
                const id = idToken.value;

                // Consume the '(' character where parameters begin
                this.consume(TokenType.Operator, '(');

                // Array to collect parameters
                const parameters = [];
                // If the parameter list is not empty (i.e., ')' doesn't come immediately)
                if (this.peek().type !== TokenType.Operator || this.peek().value !== ')') {
                    do {
                        // Each parameter must be an identifier
                        const paramToken = this.consume(TokenType.Identifier);
                        parameters.push(paramToken.value);

                        // If there is a next parameter, there will be a ',' between, consume it
                        if (this.peek().value === ',') {
                            this.consume(TokenType.Operator, ',');
                        } else {
                            break;  // Parameters finished
                        }
                    } while (true);
                }

                // ')' closing parameters
                this.consume(TokenType.Operator, ')');

                // The body of the function is a block statement, parse it
                const body = this.parseBlockStatement();

                // Finally return the function declaration object
                return {
                    type: 'FunctionDeclaration',
                    id,
                    parameters,
                    body,
                };
            }

            // Function parsing the 'return' statement
            parseReturnStatement() {
                // Consume 'return' keyword
                this.consume(TokenType.KeywordGeneral, 'return');
                let argument = null;

                // If ';' doesn't come immediately, parse the expression to be returned
                if (this.peek().type !== TokenType.Operator || this.peek().value !== ';') {
                    argument = this.parseGeneralExpression();
                }

                // Finally consume the semicolon
                this.consume(TokenType.Operator, ';');

                // Return the return statement object
                return { type: 'ReturnStatement', argument };
            }

            // Function parsing the 'if' statement
            parseIfStatement() {
                // Consume 'if' keyword (expected token)
                this.consume(TokenType.KeywordGeneral, 'if');

                // Consume opening parenthesis '(' token
                this.consume(TokenType.Operator, '(');

                // Parse the condition expression with the general expression parser
                const test = this.parseGeneralExpression();

                // Consume closing parenthesis ')' token
                this.consume(TokenType.Operator, ')');

                // If the next token is '{', parse the block statement, else parse a single statement
                const consequent = (this.peek().type === TokenType.Operator && this.peek().value === '{')
                    ? this.parseBlockStatement() // Block statement: { ... }
                    : this.parseStatement();      // Single line statement

                // Default null for 'else' block
                let alternate = null;

                // If the next token is 'else' keyword
                if (this.peek().type === TokenType.KeywordGeneral && this.peek().value === 'else') {
                    // Consume 'else' keyword
                    this.consume(TokenType.KeywordGeneral, 'else');

                    // 'else' block can also be a block statement or a single line statement
                    alternate = (this.peek().type === TokenType.Operator && this.peek().value === '{')
                        ? this.parseBlockStatement()
                        : this.parseStatement();
                }

                // Return the AST node of the parsed statement
                return { type: 'IfStatement', test, consequent, alternate };
            }

            // --- Parsing Block Statement ---
            // Multiple statements can be inside curly braces { ... }
            parseBlockStatement() {
                // Wait for and consume '{' character
                this.consume(TokenType.Operator, '{');

                // Array to store statements inside the block
                const body = [];

                // Continue until '}' closing brace
                while (this.peek().type !== TokenType.Operator || this.peek().value !== '}') {
                    // Throw error if we hit end of file or unknown character
                    if (this.peek().type === TokenType.EndOfFile || this.peek().type === TokenType.UNKNOWN) {
                        this.recordError("Block statement incomplete: expected '}'", this.peek());
                        break;
                    }

                    // Parse statement inside block and add to array
                    body.push(this.parseStatement());
                }

                // Consume '}' closing brace
                this.consume(TokenType.Operator, '}');

                // Return as Block Statement object
                return { type: 'BlockStatement', body };
            }

            // --- Variable Declaration Parsing ---
            // Variable declarations made with var, let, or const
            parseVariableDeclaration() {
                // Consume 'var', 'let', or 'const' keyword
                this.consume(TokenType.KeywordVar);

                // Get variable name
                const id = this.consume(TokenType.Identifier);

                let init = null;

                // If there is an '=' sign, a value is being assigned to the variable
                if (this.peek().type === TokenType.Operator && this.peek().value === '=') {
                    this.consume(TokenType.Operator, '=');
                    init = this.parseGeneralExpression();
                }

                // There must be a semicolon at the end of the declaration
                this.consume(TokenType.Operator, ';');

                // Return object representing variable declaration
                return { type: 'VariableDeclaration', id: id.value, init: init };
            }

            // --- Parse Assignment Operation ---
            // Assigning a value to a variable
            parseAssignment() {
                // First get the name of the variable to be assigned
                const id = this.consume(TokenType.Identifier);

                // Consume '=' operator
                this.consume(TokenType.Operator, '=');

                // Parse the assigned expression
                const expression = this.parseGeneralExpression();

                // Consume semicolon at the end of the line
                this.consume(TokenType.Operator, ';');

                // Return object representing assignment operation
                return { type: 'AssignmentExpression', id: id.value, init: expression };
            }

            // --- Single Line Expression Parsing ---
            // An expression must end with a semicolon
            parseExpressionStatement() {
                // Get expression using general expression parser
                const expression = this.parseGeneralExpression();

                // Wait for and consume semicolon at the end
                this.consume(TokenType.Operator, ';');

                // Return object of type ExpressionStatement
                return { type: 'ExpressionStatement', expression };
            }

            // --- For Loop Parsing ---
            // for (init; test; update) { ... }
            parseForStatement() {
                // Get 'for' keyword
                this.consume(TokenType.KeywordGeneral, 'for');

                // Open parenthesis
                this.consume(TokenType.Operator, '(');

                // First part: can be variable declaration, expression, or empty
                let init = null;
                if (this.peek().type === TokenType.KeywordVar) {
                    // var, let, or const declaration
                    init = this.parseVariableDeclaration();
                } else if (this.peek().value !== ';') {
                    // could be another expression
                    init = this.parseExpressionStatement();
                } else {
                    // if empty, just consume the semicolon
                    this.consume(TokenType.Operator, ';');
                }

                // Condition expression, null if absent
                let test = null;
                if (this.peek().value !== ';') {
                    test = this.parseGeneralExpression();
                }

                // Semicolon ending the condition
                this.consume(TokenType.Operator, ';');

                // Update expression, null if absent
                let update = null;
                if (this.peek().value !== ')') {
                    update = this.parseGeneralExpression();
                }

                // Close parenthesis
                this.consume(TokenType.Operator, ')');

                // Parse body of the loop
                const body = this.parseBlockStatement();

                // Return object representing for loop
                return { type: 'ForStatement', init, test, update, body };
            }

            // --- Break Statement Parsing ---
            // To exit a loop or switch
            parseBreakStatement() {
                // Get 'break' keyword
                this.consume(TokenType.KeywordGeneral, 'break');

                // Must end with semicolon
                this.consume(TokenType.Operator, ';');

                // Break statement object
                return { type: 'BreakStatement' };
            }

            // --- Continue Statement Parsing ---
            // To skip current iteration of loop
            parseContinueStatement() {
                // Get 'continue' keyword
                this.consume(TokenType.KeywordGeneral, 'continue');

                // Must end with semicolon
                this.consume(TokenType.Operator, ';');

                // Continue statement object
                return { type: 'ContinueStatement' };
            }

            // --- Switch Statement Parsing ---
            // switch (discriminant) { case ...: ... default: ... }
            parseSwitchStatement() {
                // Get 'switch' keyword
                this.consume(TokenType.KeywordGeneral, 'switch');

                // Open parenthesis
                this.consume(TokenType.Operator, '(');

                // Expression switch will evaluate
                const discriminant = this.parseGeneralExpression();

                // Close parenthesis
                this.consume(TokenType.Operator, ')');

                // Open curly brace
                this.consume(TokenType.Operator, '{');

                const cases = [];

                // Continue until closing brace
                while (this.peek().type !== TokenType.Operator || this.peek().value !== '}') {

                    if (this.peek().type === TokenType.KeywordCase) {
                        // case clause
                        this.consume(TokenType.KeywordCase, 'case');

                        // test for the case (e.g., case 5:)
                        const test = this.parseGeneralExpression();

                        // Colon
                        this.consume(TokenType.Operator, ':');

                        const consequent = [];
                        // Collect statements in case block, continue until new case/default or closing brace
                        while (
                            this.peek().type !== TokenType.KeywordCase &&
                            !(this.peek().type === TokenType.KeywordGeneral && this.peek().value === 'default') &&
                            !(this.peek().type === TokenType.Operator && this.peek().value === '}')
                        ) {
                            consequent.push(this.parseStatement());
                        }

                        cases.push({ type: 'SwitchCase', test, consequent });

                    } else if (this.peek().type === TokenType.KeywordGeneral && this.peek().value === 'default') {
                        // default clause
                        this.consume(TokenType.KeywordGeneral, 'default');
                        this.consume(TokenType.Operator, ':');

                        const consequent = [];
                        // Collect statements in default block, continue until new case/default or closing brace
                        while (
                            this.peek().type !== TokenType.KeywordCase &&
                            !(this.peek().type === TokenType.KeywordGeneral && this.peek().value === 'default') &&
                            !(this.peek().type === TokenType.Operator && this.peek().value === '}')
                        ) {
                            consequent.push(this.parseStatement());
                        }

                        cases.push({ type: 'SwitchCase', test: null, consequent });

                    } else {
                        // Unexpected token here, record error
                        this.recordError("Unexpected statement inside switch", this.peek());

                        // Advance to skip erroneous part
                        this.position++;
                    }

                    // If end of file is reached but no closing brace, report error
                    if (this.peek().type === TokenType.EndOfFile) {
                        this.recordError("Switch statement ended without closing brace", this.peek());
                        break;
                    }
                }

                // Close curly brace
                this.consume(TokenType.Operator, '}');

                // Return switch statement
                return { type: 'SwitchStatement', discriminant, cases };
            }

            // --- Empty Statement (just a semicolon) ---
            parseEmptyStatement() {
                this.consume(TokenType.Operator, ';');
                return { type: 'EmptyStatement' };
            }

            // --- General Expression Parser ---
            // Here we parse the highest level expression (e.g., comparison)
            parseGeneralExpression() {
                return this.parseComparisonExpression();
            }

            // --- Comparison Expressions ---
            // Expressions like a > b, x == y
            parseComparisonExpression() {
                let left = this.parseAdditionExpression();

                // Supported comparison operators
                const comparisonOperators = ['>', '<', '==', '!=', '<=', '>=', '===', '!=='];

                // Process sequential comparison operators if they exist
                while (this.peek().type === TokenType.Operator && comparisonOperators.includes(this.peek().value)) {
                    const operator = this.consume(TokenType.Operator);
                    const right = this.parseAdditionExpression();
                    left = { type: 'BinaryExpression', operator: operator.value, left, right };
                }

                return left;
            }

            // --- Addition and Subtraction Operations ---
            // Expressions like a + b - c
            parseAdditionExpression() {
                let left = this.parseMultiplicationExpression();

                while (this.peek().type === TokenType.Operator && (this.peek().value === '+' || this.peek().value === '-')) {
                    const operator = this.consume(TokenType.Operator);
                    const right = this.parseMultiplicationExpression();
                    left = { type: 'BinaryExpression', operator: operator.value, left, right };
                }

                return left;
            }

            // --- Parse Multiplication and Division Operations ---
            // Expressions connected by (*) or (/)
            parseMultiplicationExpression() {
                // Get basic expression first
                let left = this.parsePrimaryExpression();

                // Loop continues if next operator is * or /
                while (this.peek().type === TokenType.Operator && (this.peek().value === '*' || this.peek().value === '/')) {
                    const operator = this.consume(TokenType.Operator);
                    const right = this.parsePrimaryExpression();
                    left = { type: 'BinaryExpression', operator: operator.value, left, right };
                }

                return left;
            }

            // --- Function Call Parsing ---
            // Example: foo(1, x+2)
            parseCallExpression(callee) {
                this.consume(TokenType.Operator, '(');
                const argumentsList = [];

                // If there are parameters in parentheses, parse them
                if (this.peek().type !== TokenType.Operator || this.peek().value !== ')') {
                    do {
                        argumentsList.push(this.parseGeneralExpression());

                        if (this.peek().value === ',') {
                            this.consume(TokenType.Operator, ',');
                        } else {
                            break;
                        }
                    } while (true);
                }

                this.consume(TokenType.Operator, ')');

                return {
                    type: 'CallExpression',
                    callee: callee.value,
                    arguments: argumentsList
                };
            }

            // --- Parse Primary Expressions ---
            // Numbers, strings, booleans, identifiers, or parenthesized expressions
            parsePrimaryExpression() {
                const token = this.peek();

                if (token.type === TokenType.Number) {
                    return this.consume(TokenType.Number);

                } else if (token.type === TokenType.String) {
                    return this.consume(TokenType.String);

                } else if (token.type === TokenType.KeywordGeneral &&
                    (token.value === 'true' || token.value === 'false' || token.value === 'null' || token.value === 'undefined')) {
                    return this.consume(TokenType.KeywordGeneral);

                } else if (token.type === TokenType.Identifier) {
                    // Could be an identifier, either variable or function call
                    let node = this.consume(TokenType.Identifier);

                    // If followed by '(', it's a function call
                    if (this.peek().type === TokenType.Operator && this.peek().value === '(') {
                        node = this.parseCallExpression(node);
                    }

                    return node;

                } else if (token.type === TokenType.Operator && token.value === '(') {
                    // Expression in parentheses
                    this.consume(TokenType.Operator, '(');
                    const expression = this.parseGeneralExpression();
                    this.consume(TokenType.Operator, ')');
                    return expression;

                } else {
                    // Unexpected token, throw error
                    const errorMessage = `Expected: Number, String, Boolean, Identifier or '(', Found: '${token.type}' ('${token.value}')`;
                    this.recordError(errorMessage, token);
                    throw new SyntaxError(errorMessage + ` at position ${token.start}`);
                }
            }
        }

        // --- GUI and Update Functions ---

        const editorElement = document.getElementById('editor'); // Text edit area
        const statusElement = document.getElementById('status'); // Area where status messages will be shown

        let lastTextContent = ''; // Previous text content, to track changes

        // Called when text changes, highlights tokens and checks syntax
        function updateHighlightAndParse() {
            const currentText = editorElement.innerText;

            // If text hasn't changed, do nothing
            if (currentText === lastTextContent) {
                return;
            }
            lastTextContent = currentText;

            // Calculate current position of the caret (cursor)
            const selection = window.getSelection();
            let caretOffset = 0;
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const preCaretRange = range.cloneRange();

                // Create a range covering all content of the editor
                preCaretRange.selectNodeContents(editorElement);

                // Limit range to where the cursor ends
                preCaretRange.setEnd(range.endContainer, range.endOffset);

                // Get cursor position as character count
                caretOffset = preCaretRange.toString().length;
            }

            // Tokenize current text (lexical analysis)
            const tokens = lexicalAnalyzer(currentText);

            // Highlight tokens and display in editor
            editorElement.innerHTML = highlightTokens(tokens);

            // Set cursor to correct position
            setCaretPosition(editorElement, caretOffset);

            // Check syntax
            checkSyntax(tokens);
        }

        // Setting cursor to correct position inside the text area
        function setCaretPosition(el, offset) {
            const range = document.createRange();
            const selection = window.getSelection();
            let currentOffset = 0;
            let found = false;

            // Recursive function to position cursor in text node
            function findTextNode(node) {
                for (let i = 0; i < node.childNodes.length; i++) {
                    const child = node.childNodes[i];

                    if (child.nodeType === Node.TEXT_NODE) {
                        const nodeLength = child.nodeValue.length;

                        if (offset >= currentOffset && offset <= currentOffset + nodeLength) {
                            // Cursor will be set here
                            range.setStart(child, offset - currentOffset);
                            range.setEnd(child, offset - currentOffset);
                            found = true;
                            return;
                        }
                        currentOffset += nodeLength;

                    } else if (child.nodeType === Node.ELEMENT_NODE && child.childNodes.length > 0) {
                        // If line break <br>, increment offset by 1
                        if (child.tagName === 'BR') {
                            currentOffset += 1;
                        }
                        if (!found) findTextNode(child);
                    }

                    if (found) return;
                }
            }

            // Set cursor in text node
            findTextNode(el);

            if (found) {
                // Remove existing selections and select the new range
                selection.removeAllRanges();
                selection.addRange(range);
            } else {
                // If not found, place cursor at the end of the text area
                const lastChild = el.lastChild;
                if (lastChild) {
                    if (lastChild.nodeType === Node.TEXT_NODE) {
                        range.setStart(lastChild, lastChild.nodeValue.length);
                        range.setEnd(lastChild, lastChild.nodeValue.length);
                    } else {
                        range.selectNodeContents(el);
                        range.collapse(false);
                    }
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }
        }

        // Checks syntax, shows error if any, else shows valid message
        function checkSyntax(allTokens) {
            // Remove space and comment tokens
            const parserTokens = allTokens.filter(t => t.type !== TokenType.Whitespace && t.type !== TokenType.Comment);

            // If empty or only end-of-file token, accept as valid
            if (parserTokens.length === 0 || (parserTokens.length === 1 && parserTokens[0].type === TokenType.EndOfFile)) {
                statusElement.classList.remove('error');
                editorElement.classList.remove('syntax-error');
                statusElement.textContent = 'Syntax Valid!';
                return;
            }

            // Create parser and parse program
            const parser = new Parser(parserTokens);
            const ast = parser.parseProgram();

            if (ast.errors && ast.errors.length > 0) {
                // Show status if there is an error
                statusElement.classList.add('error');
                editorElement.classList.add('syntax-error');
                const firstError = ast.errors[0];
                let errorMessage = `Syntax Error: ${firstError.message}`;
                statusElement.textContent = errorMessage;
            } else {
                // Clear and show success message if no error
                statusElement.classList.remove('error');
                editorElement.classList.remove('syntax-error');
                statusElement.textContent = 'Syntax Valid!';
            }
        }

        // Update whenever there is an input in the text editor
        editorElement.addEventListener('input', updateHighlightAndParse);

        // Call once when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            updateHighlightAndParse();
        });

    </script>
</body>
